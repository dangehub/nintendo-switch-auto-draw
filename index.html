<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS Auto Draw</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部 -->
    <div class="header">
        <h1 data-i18n="title_main">🎮 NS Auto Draw</h1>
        <span class="subtitle" data-i18n="subtitle">Switch 自动绘图工具</span>
        <div class="connection-bar">
            <span class="badge badge-off" id="connBadge" data-i18n="status_disconnected">未连接</span>
            <span id="deviceInfo" style="font-size:12px;color:var(--text-muted)"></span>
            <button class="btn btn-primary" id="connectBtn" data-i18n="btn_connect">连接 SwiCC</button>
            <button class="btn btn-danger" id="disconnectBtn" disabled data-i18n="btn_disconnect">断开</button>
            <button class="btn" id="langToggleBtn" style="margin-left: 10px; font-weight: bold;">🌐 En/中</button>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="main">
        <!-- 左列：图片 -->
        <div class="card">
            <div class="card-title" data-i18n="card_image">📷 图片</div>
            <div class="upload-zone" id="uploadZone">
                <div class="icon">📁</div>
                <div data-i18n="upload_text">拖拽图片到此处 或 <strong>点击上传</strong></div>
                <div style="font-size:12px;margin-top:4px;color:var(--text-muted)" data-i18n="upload_subtext">支持 JPG / PNG</div>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <div class="preview-row" id="previewRow" style="display:none">
                <div class="preview-box">
                    <canvas id="srcPreview" width="256" height="256"></canvas>
                    <div class="label" id="srcLabel" data-i18n="label_src">原图</div>
                </div>
                <div class="preview-box">
                    <canvas id="outPreview" width="256" height="256"></canvas>
                    <div class="label" id="outLabel" data-i18n="label_out">量化后</div>
                    <button class="btn btn-primary" id="btnEdit" style="margin-top: 8px; width: 100%; font-size: 12px; padding: 4px;" disabled data-i18n="btn_edit_fullscreen">🖌️ 橡皮擦 (全屏修改)</button>
                </div>
            </div>
            <div class="palette" id="paletteDisplay"></div>
            <div class="palette-info" id="paletteInfo"></div>
        </div>

        <!-- 右列：参数 & 控制 -->
        <div style="display:flex;flex-direction:column;gap:16px">
            <div class="card">
                <h3 class="card-title">⚙️ <span data-i18n="card_params">参数</span></h3>
                <div class="param-grid">
                    <label data-i18n="param_preset">游戏预设</label>
                    <select id="gamePreset"></select>
                    
                    <div style="grid-column: 1 / -1; height: 1px; background: var(--border); margin: 4px 0;"></div>

                    <label data-i18n="param_width">画布宽度</label>
                    <input type="number" id="canvasW" value="256" min="8" max="512" step="1">
                    <label data-i18n="param_height">画布高度</label>
                    <input type="number" id="canvasH" value="256" min="8" max="512" step="1">
                    <label data-i18n="param_colors">颜色数量</label>
                    <input type="range" id="numColors" min="1" max="32" value="16">
                    <label class="drag-label" data-target="startX" data-step="1" style="cursor: ew-resize;" data-i18n="param_startx" title="拖动鼠标左右调节">起始 X</label>
                    <input type="number" id="startX" value="128" min="0" max="512">
                    <label class="drag-label" data-target="startY" data-step="1" style="cursor: ew-resize;" data-i18n="param_starty" title="拖动鼠标左右调节">起始 Y</label>
                    <input type="number" id="startY" value="128" min="0" max="512">
                    
                    <label class="drag-label" data-target="imgScaleX" data-step="0.01" style="color:var(--primary);font-weight:bold; cursor: ew-resize;" data-i18n="param_scale_x" title="拖动鼠标左右调节">图像缩放 X</label>
                    <input type="number" id="imgScaleX" value="1.0" min="0.01" max="10.0" step="0.01">
                    <label class="drag-label" data-target="imgScaleY" data-step="0.01" style="color:var(--primary);font-weight:bold; cursor: ew-resize;" data-i18n="param_scale_y" title="拖动鼠标左右调节">图像缩放 Y</label>
                    <input type="number" id="imgScaleY" value="1.0" min="0.01" max="10.0" step="0.01">
                    <label class="drag-label" data-target="imgOffsetX" data-step="1" style="color:var(--primary);font-weight:bold; cursor: ew-resize;" data-i18n="param_offsetx" title="拖动鼠标左右调节">图像偏移 X</label>
                    <input type="number" id="imgOffsetX" value="0" step="1">
                    <label class="drag-label" data-target="imgOffsetY" data-step="1" style="color:var(--primary);font-weight:bold; cursor: ew-resize;" data-i18n="param_offsety" title="拖动鼠标左右调节">图像偏移 Y</label>
                    <input type="number" id="imgOffsetY" value="0" step="1">

                    <label style="color:var(--text-secondary)" data-i18n="param_bw_threshold">黑白阈值 (单色)</label>
                    <input type="range" id="bwThreshold" min="0" max="255" value="128">

                    <label data-i18n="param_pf">按键帧数(pf)</label>
                    <input type="number" id="pressFrames" value="3" min="1" max="10">
                    <label data-i18n="param_rf">释放帧数(rf)</label>
                    <input type="number" id="releaseFrames" value="3" min="1" max="10">
                    <label data-i18n="param_dither">抖动算法</label>
                    <select id="ditherMode">
                        <option value="fs" data-i18n="dither_fs">Floyd-Steinberg</option>
                        <option value="none" data-i18n="dither_none">无（直接量化）</option>
                    </select>
                </div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:8px">
                    <span data-i18n="color_count_label">颜色数: </span><strong id="colorCountLabel">16</strong>
                </div>
                <button class="btn btn-accent" id="processBtn" style="margin-top:12px;width:100%" disabled data-i18n="btn_process">
                    🔄 处理图片
                </button>
            </div>

            <div class="card">
                <div class="card-title" data-i18n="card_control">🎨 绘图控制</div>
                <div class="stats" id="statsPanel" style="display:none">
                    <div class="stat-item">
                        <div class="stat-value" id="statLayers">-</div>
                        <div class="stat-label" data-i18n="stat_layers">颜色层</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statPixels">-</div>
                        <div class="stat-label" data-i18n="stat_pixels">总像素</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statTime">-</div>
                        <div class="stat-label" data-i18n="stat_time">预估时间</div>
                    </div>
                </div>

                <div class="progress-container" id="progressContainer" style="display:none">
                    <div class="progress-bar">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText" data-i18n="progress_ready">就绪</div>
                </div>

                <div class="control-row">
                    <button class="btn btn-primary" id="startBtn" disabled data-i18n="btn_start">▶ 开始绘制</button>
                    <button class="btn" id="pauseBtn" disabled data-i18n="btn_pause">⏸ 暂停</button>
                    <button class="btn btn-danger" id="stopBtn" disabled data-i18n="btn_stop">⏹ 停止</button>
                </div>
            </div>

            <!-- 手柄与校准 -->
            <div class="card">
                <div class="card-title" data-i18n="card_hardware">🔧 手柄与校准</div>
                <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
                    <button class="btn btn-primary" id="btnDoubleA" disabled data-i18n="btn_test_a">🎮 按 A 键 (用于配对)</button>
                </div>
                <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px" data-i18n="calib_desc_1">
                    <strong>校准测试：</strong>如果你不知道起始坐标是多少，可以测试归零。如果画笔超出边界，说明【参数】里的起始 X/Y 设大了。
                </div>
                <div class="control-row">
                    <button class="btn" id="btnTestHome" disabled data-i18n="btn_test_home">🏠 测归零：移动到 (0,0)</button>
                </div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:12px;margin-bottom:8px" data-i18n="calib_desc_2">
                    <strong>换色校准：</strong>如果在游戏里光标已经手动置于纯白色（最左上角，横轴最左），点击下方同步：
                </div>
                <div class="control-row">
                    <button class="btn" id="btnResetColorState" data-i18n="btn_reset_color">🔄 重置网页换色跟踪状态到 (0,0,0)</button>
                </div>
                <div style="font-size:12px;color:var(--primary);margin-top:4px" id="colorStateLabel" data-i18n="color_state_label">
                    当前换色跟踪状态: H:0, S:0, V:0
                </div>
            </div>
        </div>

        <!-- 日志 -->
        <div class="card log-panel">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                <div class="card-title" style="margin:0" data-i18n="card_log">📋 日志</div>
                <button class="btn" id="clearLogBtn" style="margin-left:auto;padding:3px 10px;font-size:11px" data-i18n="btn_clear_log">清空</button>
            </div>
            <div class="log-box" id="logBox"></div>
        </div>
    </div>

    <!-- 图像编辑器 -->
    <div class="modal-overlay" id="editorModal">
        <div class="modal" style="max-width: 98vw; max-height: 98vh; width: 98vw; height: 98vh; display: flex; flex-direction: column;">
            <h3 data-i18n="editor_title" style="margin-bottom: 8px;">图像编辑器</h3>
            <div style="display: flex; gap: 16px; flex: 1; min-height: 0;">
                
                <!-- 左侧工具栏 -->
                <div class="editor-toolbar" style="display: flex; flex-direction: column; gap: 8px; width: 140px; flex-shrink: 0; background: var(--bg-input); padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                    <button class="btn btn-tool active" id="toolTransform" data-tool="transform">↖️ <span data-i18n="tool_transform">变换</span></button>
                    <button class="btn btn-tool" id="toolMove" data-tool="move">✋ <span data-i18n="tool_move">移动</span></button>
                    <button class="btn btn-tool" id="toolEraser" data-tool="eraser">🖌️ <span data-i18n="tool_eraser">橡皮擦</span></button>
                    
                    <hr style="border: 0; border-top: 1px solid var(--border); margin: 8px 0;">
                    
                    <!-- 变换工具选项 -->
                    <div id="optsTransform" class="tool-opts" style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="font-size: 12px; display: flex; align-items: center; gap: 4px;">
                            <input type="checkbox" id="editorLockRatio" checked>
                            <span data-i18n="opt_lock_ratio">锁定横纵比</span>
                        </label>
                    </div>

                    <!-- 橡皮擦选项 -->
                    <div id="optsEraser" class="tool-opts" style="display: none; flex-direction: column; gap: 8px;">
                        <label style="font-size: 12px;" data-i18n="editor_eraser_size">橡皮大小</label>
                        <input type="range" id="eraserSize" min="1" max="50" value="10" style="width: 100%;">
                    </div>
                </div>

                <!-- 右侧画布区 -->
                <div id="editorCanvasContainer" style="flex: 1; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 8px; overflow: hidden; position: relative;">
                    <!-- 实际绘画层 -->
                    <canvas id="editorCanvas" style="background: #fff; cursor: crosshair; position: absolute; box-shadow: 0 4px 20px rgba(0,0,0,0.5);"></canvas>
                    <!-- UI交互层 (用于绘制 Bounding Box) -->
                    <canvas id="editorUICanvas" style="position: absolute; pointer-events: auto;"></canvas>
                </div>
            </div>

            <div class="modal-btns" style="margin-top: 16px;">
                <button class="btn" id="editorCancelBtn" data-i18n="editor_cancel">取消</button>
                <button class="btn btn-primary" id="editorSaveBtn" data-i18n="editor_save">保存</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js?v=2"></script>
</body>
</html>
